# HA dashboard kiosk config for sway on Razer Phone 2.
# Landscape (90deg) + 2x scale on the 1440x2560 panel -> logical 1280x720.
output DSI-1 transform 90 scale 2

default_border none
focus_follows_mouse no
xwayland disable

# Hide the cursor quickly on a touch device.
seat * hide_cursor 3000

for_window [app_id="org.gnome.Epiphany"] fullscreen enable

exec epiphany https://demo.home-assistant.io
