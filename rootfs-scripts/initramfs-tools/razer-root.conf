# Razer Phone 2 Linux root device.
#
# Android bootloaders may append their stock verified-boot root device
# (for example root=/dev/dm-0) to /proc/cmdline after the boot.img cmdline.
# initramfs-tools parses cmdline after conf.d, so the matching local-top script
# uses this variable after cmdline parsing and before local root mounting.
RAZER_ROOT=/dev/disk/by-partlabel/userdata
